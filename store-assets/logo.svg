<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="30" fill="url(#bg)"/>

  <!-- winding route -->
  <path d="M22 104 C 44 104, 40 70, 64 70 C 88 70, 84 36, 106 36"
        fill="none" stroke="#ffffff" stroke-opacity="0.30"
        stroke-width="9" stroke-linecap="round"/>

  <!-- map pin -->
  <path d="M64 16 C 44 16, 30 31, 30 51 C 30 76, 64 102, 64 102 C 64 102, 98 76, 98 51 C 98 31, 84 16, 64 16 Z"
        fill="#ffffff"/>

  <!-- fuel drop inside pin -->
  <path d="M64 32 C 74 47, 81 54, 81 63 a17 17 0 1 1 -34 0 c0 -9 7 -16 17 -31 Z"
        fill="url(#drop)"/>
</svg>
